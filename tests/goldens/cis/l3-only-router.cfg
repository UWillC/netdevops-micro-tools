hostname L3-ONLY-RTR
!
service password-encryption
!
aaa new-model
aaa authentication login default group tacacs+ local
!
enable algorithm-type scrypt secret strongpass
!
ip ssh version 2
no ip http server
!
interface GigabitEthernet0/0
 description UPLINK
 ip address 10.0.0.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/1
 description LAN
 ip address 10.0.1.1 255.255.255.0
 no shutdown
!
line vty 0 15
 access-class MGMT-ACL in
 exec-timeout 10 0
 login local
 transport input ssh
!
