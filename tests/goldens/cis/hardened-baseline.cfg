hostname GOOD-RTR
!
service password-encryption
service tcp-keepalives-in
service tcp-keepalives-out
service timestamps log datetime msec localtime show-timezone
service timestamps debug datetime msec localtime show-timezone
no service pad
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa accounting exec default start-stop group tacacs+
!
enable algorithm-type scrypt secret cisco9strongpassword
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
no ip http server
no ip source-route
no ip bootp server
no ip gratuitous-arps
no cdp run
!
ip domain-name example.com
!
banner motd ^
Unauthorized access to this system is prohibited.
This system is monitored and all activity is recorded.
Violators will be subject to civil and criminal prosecution under applicable laws.
^
!
snmp-server group ADMIN v3 priv
snmp-server user admin ADMIN v3 auth sha AUTHKEY priv aes 128 PRIVKEY
!
logging buffered 64000 informational
logging host 10.10.1.60
!
ntp server 10.10.1.70 prefer
ntp server 2001:db8::1 iburst
ntp authenticate
ntp authentication-key 1 md5 xxx
ntp trusted-key 1
!
line con 0
 exec-timeout 10 0
 login local
!
line vty 0 15
 access-class MGMT-ACL in
 exec-timeout 10 0
 login local
 transport input ssh
!
