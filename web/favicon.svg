<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Network topology: 5 nodes + 4 links -->
  <!-- Links first (behind nodes) -->
  <line x1="8"  y1="9"  x2="16" y2="16" stroke="#30363d" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="24" y1="9"  x2="16" y2="16" stroke="#30363d" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="8"  y2="23" stroke="#30363d" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="23" stroke="#30363d" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Outer nodes -->
  <circle cx="8"  cy="9"  r="2.6" fill="#58a6ff"/>
  <circle cx="24" cy="9"  r="2.6" fill="#58a6ff"/>
  <circle cx="8"  cy="23" r="2.6" fill="#3fb950"/>
  <circle cx="24" cy="23" r="2.6" fill="#3fb950"/>

  <!-- Center hub -->
  <circle cx="16" cy="16" r="3.4" fill="url(#accent)"/>
  <circle cx="16" cy="16" r="1.3" fill="#ffffff" opacity="0.9"/>
</svg>
